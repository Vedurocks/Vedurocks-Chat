<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT Secure Web Messenger</title>
    <!-- CryptoJS for AES Encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #008069; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px; border-radius: 10px; margin: 5px 0; position: relative; }
        .received { background: white; align-self: flex-start; border: 1px solid #ddd; }
        .sent { background: #d9fdd3; align-self: flex-end; }
        .sender { font-size: 0.8em; color: #667781; font-weight: bold; }
        #controls { background: white; padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #008069; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #005e4d; }
        #settings { padding: 10px; background: #eee; border-bottom: 1px solid #ddd; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="header">
    <strong>BT Secure Web Messenger</strong>
    <div>
        <span id="status">Disconnected</span>
        <button onclick="connectSerial()" id="btnConnect">Connect to Bluetooth Port</button>
    </div>
</div>

<div id="settings">
    Channel: <input type="text" id="channel" value="General" style="width:80px"> | 
    Key: <input type="text" id="encKey" value="1234567812345678" style="width:120px"> | 
    Master Pass: <input type="password" id="masterPass" style="width:80px">
    <button onclick="checkMaster()">Master Mode</button>
</div>

<div id="chat-window"></div>

<div id="controls">
    <input type="text" id="messageInput" placeholder="Type a message or paste a link...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    let port;
    let writer;
    let isMaster = false;

    // --- Encryption Logic (Matches Android) ---
    function encrypt(data, key) {
        const keyHex = CryptoJS.enc.Utf8.parse(key.padEnd(16, ' ').substring(0, 16));
        const encrypted = CryptoJS.AES.encrypt(data, keyHex, {
            mode: CryptoJS.mode.ECB,
            padding: CryptoJS.pad.Pkcs7
        });
        return encrypted.toString();
    }

    function decrypt(data, key) {
        try {
            const keyHex = CryptoJS.enc.Utf8.parse(key.padEnd(16, ' ').substring(0, 16));
            const decrypted = CryptoJS.AES.decrypt(data, keyHex, {
                mode: CryptoJS.mode.ECB,
                padding: CryptoJS.pad.Pkcs7
            });
            return decrypted.toString(CryptoJS.enc.Utf8);
        } catch (e) { return "[Decryption Failed]"; }
    }

    // --- Bluetooth Serial Logic ---
    async function connectSerial() {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            document.getElementById('status').innerText = "Connected";
            document.getElementById('btnConnect').style.display = "none";
            
            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            const reader = textDecoder.readable.getReader();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                handleIncomingData(value);
            }
        } catch (error) {
            console.error(error);
            alert("Connection failed. Ensure the Bluetooth COM port is selected.");
        }
    }

    function handleIncomingData(rawData) {
        // Protocol: SENDER|CHANNEL|TYPE|ENCRYPTED_DATA
        const parts = rawData.split('|');
        if (parts.length >= 4) {
            const sender = parts[0];
            const channel = parts[1];
            const type = parts[2];
            const encryptedData = parts[3];
            const key = document.getElementById('encKey').value;
            const currentChannel = document.getElementById('channel').value;

            if (isMaster || channel === currentChannel) {
                const decrypted = decrypt(encryptedData, key);
                addMessage(sender, decrypted, 'received', channel);
            }
        }
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value;
        if (!text || !port) return;

        const channel = document.getElementById('channel').value;
        const key = document.getElementById('encKey').value;
        const type = text.startsWith('http') ? "LINK" : "TEXT";
        
        const encrypted = encrypt(text, key);
        // Payload: PC_WEB|CHANNEL|TYPE|ENCRYPTED_DATA
        const payload = `PC_WEB|${channel}|${type}|${encrypted}\n`;

        writer = port.writable.getWriter();
        await writer.write(new TextEncoder().encode(payload));
        writer.releaseLock();

        addMessage("Me", text, 'sent', channel);
        input.value = "";
    }

    function addMessage(sender, text, side, ch) {
        const window = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `message ${side}`;
        
        let content = `<div class="sender">${sender} ${isMaster ? '(Ch: '+ch+')' : ''}</div>`;
        if (text.startsWith('http')) {
            content += `<a href="${text}" target="_blank">${text}</a>`;
        } else {
            content += `<div>${text}</div>`;
        }
        
        div.innerHTML = content;
        window.appendChild(div);
        window.scrollTop = window.scrollHeight;
    }

    function checkMaster() {
        if (document.getElementById('masterPass').value === "x32rvd") {
            isMaster = true;
            alert("Master Mode Active!");
        }
    }
</script>

</body>
</html>
